name: Build, Publish NuGet, and Deploy Pages

on:
  push:
    branches:
      - '**'
      - '!master' 
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.2.0).'
        required: true
        default: '1.0.0'

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: read

jobs:
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
          
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
          
      - name: Install SonarQube Cloud scanner
        run: dotnet tool install --global dotnet-sonarscanner
        
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin /k:"JHunter101_beauo" /o:"jhunter101" /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          dotnet build
          dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  build-and-publish-nuget:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine Version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ github.ref_name }}" == "master" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          else
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
            LATEST=${LATEST#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
            SANITIZED_BRANCH=$(echo "${{ github.ref_name }}" | tr '/_' '-' | tr '[:upper:]' '[:lower:]')
            echo "version=$MAJOR.$((MINOR + 1)).0-preview.$SANITIZED_BRANCH.${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Pack Package
        run: dotnet pack beauo/beauo.csproj -c Release -o nupkg /p:Version=${{ steps.version.outputs.version }}

      - name: NuGet Login
        uses: NuGet/login@v1
        id: login
        with:
          user: JHunter101 

      - name: Push to NuGet
        run: dotnet nuget push nupkg/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        if: steps.version.outputs.is_prerelease == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          generate_release_notes: true

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-and-publish-nuget
    if: github.ref_name == 'master' && github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Web Project
        run: dotnet publish Web.Client/Web.Client.csproj -c Release -o release

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4